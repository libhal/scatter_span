name: ✅ CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    strategy:
      matrix:
        # TODO: Add second matrix dimension for compilers once GCC supports modules
        include:
          - os: ubuntu-latest
            os_name: linux
          - os: macos-latest
            os_name: mac
          - os: windows-latest
            os_name: windows

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Conan
        uses: ./.github/actions/configure_conan
      
      - name: Build and Test
        shell: bash
        run: conan build . -pr:a hal/tc/llvm -pr hal/os/${{ matrix.os_name }}
          